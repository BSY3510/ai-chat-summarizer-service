version: '3.8'
services:
  # 1. 데이터베이스 컨테이너
  mysql-local:
    image: mysql:8.0
    container_name: chatbot-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: local_password
      MYSQL_DATABASE: chatbot_db

  # 2. 백엔드(Spring Boot) 컨테이너
  backend:
    build: ./backend             # backend 폴더의 Dockerfile을 읽어서 이미지를 만듭니다.
    container_name: chatbot-backend
    ports:
      - "8080:8080"
    environment:
      # application.properties의 설정을 덮어씁니다. (localhost 대신 컨테이너 이름인 mysql-local 사용!)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-local:3306/chatbot_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_PASSWORD: local_password
    depends_on:
      - mysql-local              # DB가 켜진 후에 백엔드를 켭니다.

  # 3. 프론트엔드(React + Nginx) 컨테이너
  frontend:
    build: ./frontend            # frontend 폴더의 Dockerfile을 읽어옵니다.
    container_name: chatbot-frontend
    ports:
      - "80:80"                  # 브라우저 기본 포트인 80으로 연결합니다.
    depends_on:
      - backend                  # 백엔드가 켜진 후에 프론트엔드를 켭니다.